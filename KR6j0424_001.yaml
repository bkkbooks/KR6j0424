body:
  text: 巴看落目瓦傳元甘泉馬蹄山中川守分真師姪智慧譯敬禮一切諸佛菩薩救護一切面前住究竟發於菩提心一切有情作利益輪迴有情至彼岸癡心瞋心本自性慳貪貢高本自性始從今日至菩提未證中間不復造惡業貪瞋皆捨離制學依行恒歡喜隨喜正覺解所行自己恒時所修善不取菩提之正路若一有情未出離住於暗劫恒化利無量不思議劫中願常恒遊佛淨土某甲執名所作罪十方界中普皆聞自己身語之惡業於一切處恒清淨意中惡業亦清淨無邊惡業不復造聖者文殊師利往昔為啞馬國王時於雷音王佛處發此菩提心願文
